<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清单革命</title>
<style>
:root {
  --bg: #faf7f2;
  --card: #ffffff;
  --text: #2c2c2c;
  --text-light: #888;
  --text-lighter: #bbb;
  --border: #ebe3d6;
  --accent: #d97706;
  --accent-light: #fef3e2;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --orange: #ea580c;
  --red: #dc2626;
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --shadow: 0 1px 3px rgba(120,80,30,0.06);
  --shadow-hover: 0 2px 8px rgba(120,80,30,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
  font-size: 16px;
  line-height: 1.6;
}

.container {
  max-width: 800px;
  margin: 0 auto;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.header-left h1 {
  font-size: 26px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
}

.header-left .date-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
}

.date-input {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 15px;
  color: var(--text-light);
  background: var(--card);
  cursor: pointer;
}

.stats {
  text-align: right;
}

.stats .rate {
  font-size: 32px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}

.stats .rate-label {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 4px;
}

/* 7天快捷条 */
.week-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 18px;
  background: var(--card);
  padding: 10px;
  border-radius: 12px;
  box-shadow: var(--shadow);
}

.day-card {
  flex: 1;
  text-align: center;
  padding: 8px 4px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
  min-width: 0;
}

.day-card:hover { background: var(--accent-light); }

.day-card.active {
  background: var(--accent);
}

.day-card.active .day-date,
.day-card.active .day-week,
.day-card.active .day-rate { color: #fff; }

.day-card .day-date {
  font-size: 15px;
  font-weight: 600;
}

.day-card .day-week {
  font-size: 11px;
  color: var(--text-light);
  margin: 2px 0;
}

.day-card .day-rate {
  font-size: 11px;
  color: var(--green);
  font-weight: 600;
}

/* Add task bar */
.add-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  background: var(--card);
  padding: 14px;
  border-radius: 12px;
  box-shadow: var(--shadow);
}

.add-bar input[type="text"] {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}

.add-bar input[type="text"]:focus {
  border-color: var(--accent);
}

.priority-select {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 10px;
  font-size: 14px;
  background: var(--card);
  cursor: pointer;
  color: var(--text);
}

.btn-add {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 22px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s;
}

.btn-add:hover { opacity: 0.85; }

/* Color picker */
.color-picker {
  display: flex;
  align-items: center;
  gap: 5px;
}

.color-dot {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.15s;
  flex-shrink: 0;
}

.color-dot:hover { transform: scale(1.2); }
.color-dot.selected { border-color: #333; box-shadow: 0 0 0 2px #fff; }
.color-dot.auto { 
  border: 1px dashed #ccc; 
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  color: #999;
}

/* Task list */
.task-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.task-item {
  background: var(--card);
  border-radius: 12px;
  padding: 16px 18px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: all 0.2s;
  border-left: 4px solid transparent;
}

.task-item:hover { box-shadow: var(--shadow-hover); }

.task-item.priority-1 { border-left-color: var(--red); }
.task-item.priority-2 { border-left-color: var(--blue); }
.task-item.priority-3 { border-left-color: var(--orange); }
.task-item.priority-4 { border-left-color: var(--green); }

.task-item.completed { opacity: 0.6; }
.task-item.completed .task-title { text-decoration: line-through; color: var(--text-light); }

/* Checkbox */
.task-check {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.task-check:hover { border-color: var(--accent); }

.task-check.done {
  background: var(--green);
  border-color: var(--green);
}

.task-check.done::after {
  content: "✓";
  color: #fff;
  font-size: 15px;
  font-weight: 700;
}

/* Task content */
.task-body {
  flex: 1;
  min-width: 0;
}

.task-title {
  font-size: 16px;
  font-weight: 500;
  line-height: 1.5;
  word-break: break-word;
}

.task-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}

/* Priority badge */
.badge {
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 500;
  white-space: nowrap;
}

.badge.p1 { background: #fef2f2; color: var(--red); }
.badge.p2 { background: var(--blue-light); color: var(--blue); }
.badge.p3 { background: #fff7ed; color: var(--orange); }
.badge.p4 { background: var(--green-light); color: var(--green); }
.badge.status { background: var(--accent-light); color: var(--accent); }

/* Time inputs */
.time-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.time-input {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 13px;
  width: 80px;
  color: var(--text-light);
  cursor: pointer;
}

.time-arrow { color: var(--text-lighter); font-size: 12px; }
.task-note:focus { border-color: var(--accent); border-style: solid; }
.task-note::placeholder { color: var(--text-lighter); }

/* Note */
.task-note {
  margin-top: 8px;
  width: 100%;
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 14px;
  color: var(--text-light);
  outline: none;
  resize: none;
  min-height: 36px;
  background: #fafafa;
  transition: border-color 0.2s;
  font-family: inherit;
}

.task-note:focus { border-color: var(--accent); border-style: solid; }
.task-note::placeholder { color: var(--text-lighter); }

/* Actions */
.task-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}

.icon-btn {
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 5px;
  border-radius: 6px;
  font-size: 15px;
  color: var(--text-light);
  transition: all 0.15s;
  line-height: 1;
}

.icon-btn:hover { background: #f5f0e8; color: var(--text); }
.icon-btn.copy:hover { color: var(--accent); }
.icon-btn.delete:hover { color: var(--red); }
.icon-btn.move:hover { color: var(--accent); }

/* Empty state */
.empty {
  text-align: center;
  padding: 70px 20px;
  color: var(--text-lighter);
  font-size: 16px;
}

.empty .emoji { font-size: 42px; margin-bottom: 12px; }

/* Toolbar */
.toolbar {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  justify-content: center;
}

.toolbar button {
  border: 1px solid var(--border);
  background: var(--card);
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 14px;
  cursor: pointer;
  color: var(--text-light);
  transition: all 0.2s;
}

.toolbar button:hover { border-color: var(--accent); color: var(--accent); }

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #2c2c2c;
  color: #fff;
  padding: 10px 24px;
  border-radius: 24px;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 999;
}

.toast.show { opacity: 0.9; }

/* Order number */
.order-num {
  font-size: 13px;
  color: var(--text-lighter);
  font-weight: 600;
  min-width: 22px;
  text-align: center;
  margin-top: 4px;
}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>📋 清单革命</h1>
      <div class="date-row">
        <input type="date" class="date-input" id="dateInput">
      </div>
    </div>
    <div class="stats">
      <div class="rate" id="rateDisplay">0%</div>
      <div class="rate-label" id="rateLabel">0 / 0 完成</div>
    </div>
  </div>

  <!-- 最近7天快捷条 -->
  <div class="week-bar" id="weekBar"></div>

  <!-- Add bar -->
  <div class="add-bar">
    <input type="text" id="taskInput" placeholder="今天要做什么?写下来..." onkeydown="if(event.key==='Enter')addTask()">
    <select class="priority-select" id="prioritySelect">
      <option value="1">🔴 Ⅰ 重要·紧急</option>
      <option value="2" selected>🔵 Ⅱ 重要·不紧急</option>
      <option value="3">🟠 Ⅲ 紧急·不重要</option>
      <option value="4">🟢 Ⅳ 不重要·不紧急</option>
    </select>
    <div class="color-picker" id="colorPicker"></div>
    <button class="btn-add" onclick="addTask()">添加</button>
  </div>

  <!-- Task list -->
  <div class="task-list" id="taskList"></div>

  <!-- Empty state -->
  <div class="empty" id="emptyState" style="display:none;">
    <div class="emoji">📝</div>
    <div>今天还没有任务,添加一个开始吧</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button onclick="clearCompleted()">清除已完成</button>
    <button onclick="exportText()">导出文本</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PRIORITY_MAP = {
  1: { label: 'Ⅰ', cls: 'p1', name: '🔴 Ⅰ 重要·紧急' },
  2: { label: 'Ⅱ', cls: 'p2', name: '🔵 Ⅱ 重要·不紧急' },
  3: { label: 'Ⅲ', cls: 'p3', name: '🟠 Ⅲ 紧急·不重要' },
  4: { label: 'Ⅳ', cls: 'p4', name: '🟢 Ⅳ 不重要·不紧急' }
};

const COLORS = [
  '',        // 默认（无颜色）
  '#e11d48', // 红
  '#f59e0b', // 橙
  '#10b981', // 绿
  '#3b82f6', // 蓝
  '#8b5cf6', // 紫
  '#ec4899', // 粉
  '#14b8a6', // 青
  '#78716c', // 灰
];

let selectedColor = ''; // 空=随机

const WEEK_NAMES = ['日','一','二','三','四','五','六'];

let tasks = [];
let currentDate = new Date().toISOString().split('T')[0];

// ── Init ──────────────────────────────────────────────
function init() {
  document.getElementById('dateInput').value = currentDate;
  document.getElementById('dateInput').addEventListener('change', function() {
    currentDate = this.value;
    loadTasks();
    render();
  });
  renderColorPicker();
  loadTasks();
  render();
}

function loadTasks() {
  try {
    const raw = localStorage.getItem('tasks_' + currentDate);
    tasks = raw ? JSON.parse(raw) : [];
  } catch { tasks = []; }
}

// ── Color Picker ──────────────────────────────────────
function renderColorPicker() {
  const picker = document.getElementById('colorPicker');
  picker.innerHTML = '';
  
  // Random button
  const randDot = document.createElement('div');
  randDot.className = 'color-dot auto' + (selectedColor === '' ? ' selected' : '');
  randDot.title = '随机颜色';
  randDot.textContent = '?';
  randDot.onclick = () => { selectedColor = ''; renderColorPicker(); };
  picker.appendChild(randDot);
  
  // Color dots
  COLORS.slice(1).forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'color-dot' + (selectedColor === c ? ' selected' : '');
    dot.style.background = c;
    dot.title = c;
    dot.onclick = () => { selectedColor = c; renderColorPicker(); };
    picker.appendChild(dot);
  });
}

function randomColor() {
  const opts = COLORS.slice(1); // exclude empty
  return opts[Math.floor(Math.random() * opts.length)];
}
  localStorage.setItem('tasks_' + currentDate, JSON.stringify(tasks));
}

// ── 获取某天的完成率 ──────────────────────────────────
function getDayRate(dateStr) {
  try {
    const raw = localStorage.getItem('tasks_' + dateStr);
    const dayTasks = raw ? JSON.parse(raw) : [];
    if (!dayTasks.length) return null;
    const done = dayTasks.filter(t => t.completed).length;
    return Math.round(done / dayTasks.length * 100);
  } catch { return null; }
}

// ── 渲染7天快捷条 ─────────────────────────────────────
function renderWeekBar() {
  const bar = document.getElementById('weekBar');
  bar.innerHTML = '';
  const today = new Date();
  
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    const dayNum = d.getDate();
    const monthNum = d.getMonth() + 1;
    const weekIdx = d.getDay();
    const rate = getDayRate(dateStr);
    
    const card = document.createElement('div');
    card.className = 'day-card' + (dateStr === currentDate ? ' active' : '');
    card.onclick = () => {
      currentDate = dateStr;
      document.getElementById('dateInput').value = dateStr;
      loadTasks();
      render();
    };
    
    card.innerHTML = `
      <div class="day-date">${monthNum}/${dayNum}</div>
      <div class="day-week">周${WEEK_NAMES[weekIdx]}</div>
      <div class="day-rate">${rate !== null ? rate + '%' : '--'}</div>
    `;
    bar.appendChild(card);
  }
}

// ── CRUD ──────────────────────────────────────────────
function addTask() {
  const input = document.getElementById('taskInput');
  const title = input.value.trim();
  if (!title) return;
  const priority = parseInt(document.getElementById('prioritySelect').value);
  tasks.push({
    id: Date.now() + Math.random(),
    title,
    priority,
    completed: false,
    startTime: '',
    endTime: '',
    note: '',
    color: selectedColor || randomColor()
  });
  input.value = '';
  saveTasks();
  render();
}

function toggleComplete(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.completed = !t.completed;
  if (t.completed) {
    if (!t.endTime) t.endTime = currentTimeStr();
    if (!t.startTime) t.startTime = t.endTime;
  }
  saveTasks();
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
}

function updateTask(id, field, value) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t[field] = value;
  saveTasks();
}

function moveTask(id, dir) {
  const idx = tasks.findIndex(t => t.id === id);
  if (idx < 0) return;
  const target = idx + dir;
  if (target < 0 || target >= tasks.length) return;
  [tasks[idx], tasks[target]] = [tasks[target], tasks[idx]];
  saveTasks();
  render();
}

function clearCompleted() {
  const count = tasks.filter(t => t.completed).length;
  if (!count) { showToast('没有已完成的任务'); return; }
  tasks = tasks.filter(t => !t.completed);
  saveTasks();
  render();
  showToast(`已清除 ${count} 条已完成任务`);
}

// ── Copy ──────────────────────────────────────────────
function copyTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  let text = `[${PRIORITY_MAP[t.priority].name}] ${t.title}`;
  if (t.startTime) text += `\n  开始: ${t.startTime}`;
  if (t.endTime) text += `\n  结束: ${t.endTime}`;
  if (t.note) text += `\n  备注: ${t.note}`;
  text += `\n  状态: ${t.completed ? '✅ 已完成' : '⬜ 未完成'}`;

  copyToClipboard(text);
}

function exportText() {
  if (!tasks.length) { showToast('没有任务可导出'); return; }
  let lines = [`📋 清单革命 — ${currentDate}`, ''];
  const sorted = [...tasks].sort((a, b) => {
    if (a.completed !== b.completed) return a.completed ? 1 : -1;
    return a.priority - b.priority;
  });
  let doneCount = 0;
  sorted.forEach((t, i) => {
    const p = PRIORITY_MAP[t.priority];
    const status = t.completed ? '✅' : '⬜';
    lines.push(`${i+1}. ${status} ${p.name} ${t.title}`);
    if (t.startTime || t.endTime) {
      lines.push(`   ⏰ ${t.startTime || '--'} → ${t.endTime || '--'}`);
    }
    if (t.note) lines.push(`   📝 ${t.note}`);
    if (t.completed) doneCount++;
    lines.push('');
  });
  lines.push(`──────────`);
  lines.push(`完成: ${doneCount} / ${tasks.length} (${Math.round(doneCount/tasks.length*100)}%)`);

  copyToClipboard(lines.join('\n'));
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制到剪贴板');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制到剪贴板');
  });
}

// ── Render ────────────────────────────────────────────
function render() {
  renderWeekBar();
  
  const list = document.getElementById('taskList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '';

  if (!tasks.length) {
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
  }

  // Sort: uncompleted first, then by priority
  const sorted = [...tasks].sort((a, b) => {
    if (a.completed !== b.completed) return a.completed ? 1 : -1;
    return a.priority - b.priority;
  });

  sorted.forEach((t, i) => {
    const p = PRIORITY_MAP[t.priority];
    const div = document.createElement('div');
    div.className = `task-item priority-${t.priority}${t.completed ? ' completed' : ''}`;
    
    div.innerHTML = `
      <div class="order-num">${i + 1}</div>
      <div class="task-check ${t.completed ? 'done' : ''}" onclick="toggleComplete(${t.id})"></div>
      <div class="task-body">
        <div class="task-title" style="${t.color ? 'color:' + t.color : ''}">${escapeHtml(t.title)}</div>
        <div class="task-meta">
          <span class="badge ${p.cls}">${p.name}</span>
          ${t.completed ? '<span class="badge status">已完成</span>' : '<span class="badge status">待办</span>'}
          <div class="time-group">
            <input type="time" class="time-input" value="${t.startTime}" 
              onchange="updateTask(${t.id}, 'startTime', this.value)">
            <span class="time-arrow">→</span>
            <input type="time" class="time-input" value="${t.endTime}"
              onchange="updateTask(${t.id}, 'endTime', this.value)">
          </div>
        </div>
        <textarea class="task-note" placeholder="备注..." 
          onblur="updateTask(${t.id}, 'note', this.value)">${escapeHtml(t.note)}</textarea>
      </div>
      <div class="task-actions">
        <button class="icon-btn move" title="上移" onclick="moveTask(${t.id}, -1)">▲</button>
        <button class="icon-btn move" title="下移" onclick="moveTask(${t.id}, 1)">▼</button>
        <button class="icon-btn copy" title="复制" onclick="copyTask(${t.id})">📋</button>
        <button class="icon-btn delete" title="删除" onclick="deleteTask(${t.id})">✕</button>
      </div>
    `;
    list.appendChild(div);
  });

  // Stats
  const total = tasks.length;
  const done = tasks.filter(t => t.completed).length;
  const rate = total ? Math.round(done / total * 100) : 0;
  document.getElementById('rateDisplay').textContent = rate + '%';
  document.getElementById('rateLabel').textContent = `${done} / ${total} 完成`;
}

// ── Utils ─────────────────────────────────────────────
function currentTimeStr() {
  const d = new Date();
  return d.toTimeString().slice(0, 5);
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

init();
</script>

</body>
</html>
